name: 04 - Secrets Demo

on:
  workflow_dispatch:

env:
  APP_ENV: production
  NODE_ENV: production

jobs:
  secrets-demo:
    runs-on: ubuntu-latest

    env:
      DB_HOST: localhost

    steps:
      - name: Show env vars (safe to print)
        run: |
          echo "APP_ENV  = $APP_ENV"
          echo "DB_HOST  = $DB_HOST"
          echo "Actor    = ${{ github.actor }}"

      - name: Use a secret (will be masked)
        env:
          API_KEY: ${{ secrets.MY_API_KEY }}
        run: |
          echo "Key length: ${#API_KEY}" # prints the length, not the value
          echo "Key starts with: ${API_KEY:0:3}..."
          # In real usage you'd pass it to a deploy tool:
          # curl -H "Authorization: Bearer $API_KEY" https://api.example.com

      - name: Conditional step
        if: github.ref == 'refs/heads/master'
        run: echo "Only runs on a master branch"
